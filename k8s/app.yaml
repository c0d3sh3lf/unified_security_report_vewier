apiVersion: apps/v1
kind: Deployment
metadata:
  name: reports-backend
  namespace: security-reports
spec:
  replicas: 2
  selector: { matchLabels: { app: reports-backend } }
  template:
    metadata: { labels: { app: reports-backend } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 10001, fsGroup: 10001 }
      containers:
        - name: backend
          image: BACKEND_IMAGE
          ports: [{ containerPort: 4000 }]
          envFrom: [{ configMapRef: { name: security-reports-config } }, { secretRef: { name: security-reports-secrets } }]
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
          resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 500m, memory: 512Mi } }
          readinessProbe: { httpGet: { path: /health, port: 4000 }, initialDelaySeconds: 5 }
          livenessProbe: { httpGet: { path: /health, port: 4000 }, initialDelaySeconds: 15 }
---
apiVersion: v1
kind: Service
metadata: { name: reports-backend, namespace: security-reports }
spec: { selector: { app: reports-backend }, ports: [{ port: 4000, targetPort: 4000 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: reports-frontend, namespace: security-reports }
spec:
  replicas: 2
  selector: { matchLabels: { app: reports-frontend } }
  template:
    metadata: { labels: { app: reports-frontend } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 101, fsGroup: 101 }
      containers:
        - name: frontend
          image: FRONTEND_IMAGE
          ports: [{ containerPort: 8080 }]
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
          resources: { requests: { cpu: 50m, memory: 64Mi }, limits: { cpu: 250m, memory: 128Mi } }
          readinessProbe: { httpGet: { path: /, port: 8080 }, initialDelaySeconds: 5 }
---
apiVersion: v1
kind: Service
metadata: { name: reports-frontend, namespace: security-reports }
spec: { selector: { app: reports-frontend }, ports: [{ port: 80, targetPort: 8080 }] }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: security-reports
  namespace: security-reports
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [reports.example.com]
      secretName: reports-tls
  rules:
    - host: reports.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: reports-backend, port: { number: 4000 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: reports-frontend, port: { number: 80 } } }
