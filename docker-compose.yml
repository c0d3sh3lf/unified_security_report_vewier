services:
  mongo:
    image: mongo:8.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: security_reports
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/security_reports
      API_PORT: 4000
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4000:4000"
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
volumes:
  mongo_data:
